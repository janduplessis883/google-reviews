services:
  - type: web
    name: google-reviews-webhook
    runtime: python
    plan: free
    buildCommand: ""
    startCommand: python app.py
    healthCheckPath: /health
    envVars:
      - key: PRACTICE_NAME
        value: Stanhope Mews Surgery
      - key: WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: hello@attribut.me
      - key: EMAIL_TO
        value: jan.duplessis@nhs.net
